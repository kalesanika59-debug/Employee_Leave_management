<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Leave Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #eef1f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .forgot-card {
            background: white;
            padding: 45px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.18);
            width: 420px;
        }
        .icon-circle {
            background: linear-gradient(135deg, #1b2a4a, #2f7bb8);
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 24px;
        }
        .form-label { font-weight: 600; font-size: 14px; color: #333; }
        .form-control { padding: 9px 12px; border-radius: 8px; border: 1px solid #dfe3e8; }
        .btn-reset {
            background: linear-gradient(135deg, #1b2a4a, #2f7bb8);
            color: white; font-weight: bold; border: none;
            border-radius: 8px;
        }
        .btn-reset:hover { opacity: 0.92; color: white; }
    </style>
</head>
<body>
<div class="forgot-card">
    <div class="icon-circle"><i class="bi bi-key"></i></div>
    <h4 class="fw-bold mb-1 text-center">Reset Password</h4>
    <p class="text-muted text-center mb-3" style="font-size:14px;">
        Enter your username and set a new password
    </p>

    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}

    {% if success %}
    <div class="alert alert-success py-2">{{ success }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
        </div>
        <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password" class="form-control" placeholder="Enter new password" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password" required>
        </div>
        <button type="submit" class="btn btn-reset w-100 py-2">
            <i class="bi bi-arrow-repeat me-1"></i> Reset Password
        </button>
    </form>

    <a href="{% url 'login' %}" class="d-block text-center mt-3" style="font-size:14px; color:#2f7bb8;">
        <i class="bi bi-arrow-left"></i> Back to Login
    </a>
</div>
</body>
</html>
