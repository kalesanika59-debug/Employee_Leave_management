<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Leave Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #eef1f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 30px 0;
        }
        .login-wrapper {
            display: flex;
            width: 900px;
            max-width: 95%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.18);
        }
        .login-left {
            background: linear-gradient(160deg, #1b2a4a 0%, #2f7bb8 100%);
            color: white;
            padding: 50px 40px;
            width: 40%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .login-left .icon-box {
            background: rgba(255,255,255,0.15);
            width: 50px; height: 50px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            margin-bottom: 20px;
        }
        .login-left h5 { font-weight: bold; letter-spacing: 0.5px; }
        .login-left h2 { font-weight: 800; margin: 15px 0; line-height: 1.2; }
        .login-left p { color: rgba(255,255,255,0.85); font-size: 14px; }
        .login-right {
            background: white;
            width: 60%;
            padding: 45px;
        }
        .login-right h2 { font-weight: 800; color: #1b2a4a; }
        .login-right p.subtitle { color: #6c757d; font-size: 14px; margin-bottom: 20px; }
        .form-label { font-weight: 600; font-size: 14px; color: #333; }
        .form-control { padding: 9px 12px; border-radius: 8px; border: 1px solid #dfe3e8; }
        .form-control:focus { border-color: #2f7bb8; box-shadow: 0 0 0 0.2rem rgba(47,123,184,0.15); }
        .btn-register {
            background: linear-gradient(135deg, #1b2a4a, #2f7bb8);
            color: white; font-weight: bold; border: none;
            border-radius: 8px;
        }
        .btn-register:hover { opacity: 0.92; color: white; }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-left">
        <div class="icon-box"><i class="bi bi-calendar-check"></i></div>
        <h5>LEAVEMS</h5>
        <h2>Join the Leave<br>Management<br>System</h2>
        <p>Create your account to apply for leave and track your approval status.</p>
    </div>
    <div class="login-right">
        <h2 class="mb-1">Create Account</h2>
        <p class="subtitle">Register to access your employee dashboard</p>

        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Employee ID</label>
                <input type="text" name="employee_id" class="form-control" placeholder="Enter your Employee ID (given by HR)" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mobile Number</label>
                <input type="text" name="mobile_number" class="form-control" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>
            </div>
            <button type="submit" class="btn btn-register w-100 py-2 mt-2">
                <i class="bi bi-person-plus me-1"></i> Create Account
            </button>
        </form>

        <p class="text-center mt-3 mb-0" style="font-size:14px;">
            Already have an account? <a href="{% url 'login' %}" style="color:#2f7bb8; font-weight:600;">Login here</a>
        </p>
    </div>
</div>

</body>
</html>
