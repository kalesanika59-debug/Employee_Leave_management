<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leave Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #eef1f5; font-family: 'Segoe UI', sans-serif; }
        .sidebar {
            background: linear-gradient(160deg, #1b2a4a 0%, #2f7bb8 100%);
            min-height: 100vh;
            padding-top: 25px;
        }
        .sidebar .icon-box {
            background: rgba(255,255,255,0.15);
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            margin: 0 20px 10px;
        }
        .sidebar h4 {
            color: white; padding: 0 20px 20px;
            font-weight: 800; letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 10px;
        }
        .sidebar a {
            display: block;
            color: rgba(255,255,255,0.85);
            padding: 12px 24px;
            text-decoration: none;
            font-size: 15px;
            border-left: 3px solid transparent;
        }
        .sidebar a:hover, .sidebar a.active {
            background-color: rgba(255,255,255,0.12);
            color: white;
            border-left: 3px solid white;
        }
        .sidebar .logout-link {
            position: absolute;
            bottom: 20px;
            width: 240px;
        }
        .main-content { padding: 35px; }
        .stat-card {
            border-radius: 12px;
            padding: 22px;
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .stat-card h6 { opacity: 0.9; font-weight: 600; }
        .stat-card h2 { font-weight: 800; margin: 5px 0 0; }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        .table thead { background-color: #f8f9fb; }
        .btn-primary {
            background: linear-gradient(135deg, #1b2a4a, #2f7bb8);
            border: none;
        }
        .btn-primary:hover { opacity: 0.9; }
    </style>
</head>
<body>
<div class="d-flex position-relative">
    <div class="sidebar" style="width: 240px;">
        <h4><span class="icon-box"><i class="bi bi-calendar-check"></i></span> LeaveMS</h4>
        <a href="{% url 'dashboard' %}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
        <a href="{% url 'employee_list' %}"><i class="bi bi-people me-2"></i>Employees</a>
        <a href="{% url 'leave_list' %}"><i class="bi bi-file-earmark-text me-2"></i>Leaves</a>
        <a href="{% url 'logout' %}" class="logout-link"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
    </div>
    <div class="main-content flex-grow-1">
        {% block content %}
        {% endblock %}
    </div>
</div>
</body>
</html>
